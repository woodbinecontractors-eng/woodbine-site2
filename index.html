<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woodbine Exteriors</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f0d;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:black;
border-bottom:2px solid #1db954;
}

.logo{
font-size:24px;
font-weight:bold;
color:#1db954;
}

.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750') center/cover;
display:flex;
align-items:center;
padding:40px;
}

.hero h1{
font-size:50px;
}

.btn{
background:#1db954;
padding:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px;
}

.card{
background:#111;
padding:20px;
border:1px solid #1db954;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:40px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
}

.form{
padding:40px;
background:#111;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
}

</style>
</head>

<body>

<header>
<div class="logo">WOODBINE EXTERIORS</div>
<a class="btn" href="tel:9736092700">CALL NOW</a>
</header>

<section class="hero">
<div>
<h1>BUILD WITHOUT COMPROMISE</h1>
<a class="btn" href="#">GET ESTIMATE</a>
</div>
</section>

<section class="services">
<div class="card">Roofing</div>
<div class="card">Masonry</div>
<div class="card">Paving</div>
<div class="card">Landscape</div>
<div class="card">Interior Remodeling</div>
</section>

<section class="gallery">
<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994">
<img src="https://images.unsplash.com/photo-1600047509782-20d39509f26d">
<img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
</section>

<section class="form">
<h2>Request Estimate</h2>
<input placeholder="Name">
<input placeholder="Phone">
<textarea placeholder="Project details"></textarea>
<button class="btn">Send</button>
</section>

</body>
</html>
